<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="狼人杀">
    <title>狼人杀 · 特权卡版</title>
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: #1a1a3e;
            --bg-card-hover: #242456;
            --accent-green: #7fff6e;
            --accent-lime: #b8ff57;
            --accent-red: #ff4757;
            --accent-blue: #57b8ff;
            --accent-purple: #b457ff;
            --accent-yellow: #ffd557;
            --accent-orange: #ff9f43;
            --accent-pink: #ff6b9d;
            --text-primary: #ffffff;
            --text-secondary: #a0a0cc;
            --text-dim: #606088;
            --border-color: #2a2a5a;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* 全屏 App 容器：用 fixed div 代替 position:fixed 在 body 上 */
        #app-root {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%; height: 100%;
            position: absolute;
            top: 0; left: 0;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            padding: 20px 24px 10px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 22px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-lime));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-back {
            width: 40px; height: 40px;
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; color: var(--text-primary);
            transition: var(--transition);
        }
        .header-back:active { transform: scale(0.9); background: var(--bg-card-hover); }

        .content {
            flex: 1; overflow-y: auto; padding: 10px 24px 24px;
            -webkit-overflow-scrolling: touch;
        }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 16px 32px; border-radius: var(--radius);
            font-size: 17px; font-weight: 600;
            border: none; cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }
        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-lime));
            color: #000;
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-block { width: 100%; }
        .btn-lg { padding: 18px 36px; font-size: 19px; border-radius: 20px; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 16px;
        }

        .home-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; padding: 40px; text-align: center;
        }

        .home-logo {
            font-size: 80px; margin-bottom: 16px;
        }

        .home-title {
            font-size: 42px; font-weight: 800;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-lime), var(--accent-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .home-subtitle {
            font-size: 18px; color: var(--text-secondary);
            margin-bottom: 48px;
        }

        .home-buttons {
            display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px;
        }

        .setup-section {
            margin-bottom: 24px;
        }

        .setup-label {
            font-size: 15px; font-weight: 600; color: var(--text-secondary);
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
        }

        .player-count-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        }

        .player-count-btn {
            padding: 20px 10px; border-radius: var(--radius);
            background: var(--bg-card); border: 2px solid var(--border-color);
            color: var(--text-primary); font-size: 24px; font-weight: 700;
            cursor: pointer; transition: var(--transition);
            text-align: center;
        }
        .player-count-btn.selected {
            border-color: var(--accent-green);
            background: rgba(127,255,110,0.1);
        }
        .player-count-btn span {
            display: block; font-size: 12px; font-weight: 400;
            color: var(--text-secondary); margin-top: 4px;
        }

        .name-input-list { display: flex; flex-direction: column; gap: 8px; }

        .name-input-row {
            display: flex; align-items: center; gap: 10px;
        }

        .name-input {
            flex: 1; padding: 14px 16px; border-radius: var(--radius-sm);
            background: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-primary); font-size: 16px;
            outline: none;
        }
        .name-input:focus {
            border-color: var(--accent-green);
        }

        .role-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px; border-radius: var(--radius-sm);
            background: var(--bg-card); border: 1px solid var(--border-color);
            margin-bottom: 8px;
        }

        .role-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
        }

        .role-info { flex: 1; }
        .role-name { font-size: 16px; font-weight: 600; }
        .role-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        .card-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        }

        .card-option {
            padding: 16px; border-radius: var(--radius);
            background: var(--bg-card); border: 2px solid var(--border-color);
            cursor: pointer; transition: var(--transition);
        }
        .card-option.selected {
            border-color: var(--accent-lime);
            background: rgba(184,255,87,0.08);
        }

        .card-emoji { font-size: 32px; margin-bottom: 6px; }
        .card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

        .bottom-bar {
            padding: 16px 24px; padding-bottom: max(16px, env(safe-area-inset-bottom));
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center; justify-content: center;
            padding: 24px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 28px;
            max-width: 420px; width: 100%;
        }

        .modal-title {
            font-size: 22px; font-weight: 700;
            text-align: center; margin-bottom: 8px;
        }

        .modal-text {
            font-size: 15px; color: var(--text-secondary);
            text-align: center; margin-bottom: 20px;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex; flex-direction: column; gap: 10px;
        }

        .game-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            padding: 10px 0;
        }

        .player-card {
            padding: 14px; border-radius: var(--radius);
            background: var(--bg-card); border: 2px solid var(--border-color);
            cursor: pointer; transition: var(--transition);
        }
        .player-card.selected {
            border-color: var(--accent-red);
            background: rgba(255,71,87,0.1);
        }

        .player-name {
            font-size: 15px; font-weight: 600;
            margin-bottom: 6px;
        }

        .player-status {
            font-size: 13px; color: var(--text-secondary);
        }

        .game-title {
            font-size: 28px; font-weight: 800;
            text-align: center; margin: 20px 0;
        }

        .game-subtitle {
            font-size: 16px; color: var(--text-secondary);
            text-align: center; margin-bottom: 20px;
        }

        .divider {
            height: 1px; background: var(--border-color);
            margin: 16px 0;
        }

        .timer-large {
            font-size: 72px; font-weight: 800;
            text-align: center;
            font-variant-numeric: tabular-nums;
            margin: 30px 0;
        }

        /* ─── 新增美化样式 ─── */

        @keyframes timerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes popIn {
            from { transform: scale(0.88) translateY(8px); opacity: 0; }
            to   { transform: scale(1) translateY(0); opacity: 1; }
        }

        .phase-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 600; letter-spacing: 0.4px;
            margin-bottom: 16px;
        }
        .phase-badge.night  { background: rgba(88,28,135,0.35); color: #c084fc; border: 1px solid rgba(192,132,252,0.3); }
        .phase-badge.day    { background: rgba(161,98,7,0.35);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
        .phase-badge.vote   { background: rgba(153,27,27,0.35); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }

        .player-avatar {
            width: 56px; height: 56px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--bg-card-hover), var(--bg-card));
            border: 1px solid var(--border-color);
        }

        /* 性别切换按钮 */
        .gender-toggle {
            width: 52px; height: 52px; border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            font-size: 28px; cursor: pointer;
            transition: var(--transition); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .gender-toggle:active { transform: scale(0.88); }

        /* 惩罚抽签 */
        .punish-spin-box {
            width: 100%; min-height: 130px;
            border-radius: 20px;
            border: 2px solid rgba(255,71,87,0.35);
            background: linear-gradient(135deg, rgba(255,71,87,0.08), rgba(255,159,67,0.06));
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: 800;
            color: var(--text-dim);
            margin: 20px 0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .punish-spin-box.spinning {
            border-color: rgba(255,71,87,0.70);
            box-shadow: 0 0 28px rgba(255,71,87,0.20);
        }
        .punish-spin-box.revealed {
            color: var(--accent-red);
            border-color: var(--accent-red);
            box-shadow: 0 0 40px rgba(255,71,87,0.28);
            font-size: 34px;
        }

        .vote-candidate {
            display: flex; align-items: center; gap: 14px;
            padding: 16px; border-radius: var(--radius);
            background: var(--bg-card); border: 2px solid var(--border-color);
            cursor: pointer; transition: var(--transition); margin-bottom: 8px;
            animation: popIn 0.22s ease both;
        }
        .vote-candidate:active { transform: scale(0.97); }
        .vote-candidate.selected {
            border-color: var(--accent-red);
            background: rgba(255,71,87,0.1);
            box-shadow: 0 0 0 1px rgba(255,71,87,0.25), 0 6px 24px rgba(255,71,87,0.15);
        }
        .vote-candidate .player-name-label { font-size: 16px; font-weight: 600; flex: 1; }
        .vote-candidate .vote-check { font-size: 20px; opacity: 0; transition: opacity 0.18s; }
        .vote-candidate.selected .vote-check { opacity: 1; }

        .vote-progress-bar {
            display: flex; gap: 6px; justify-content: center; margin-bottom: 20px;
        }
        .vote-dot {
            height: 4px; border-radius: 2px; flex: 1; max-width: 44px;
            background: var(--border-color); transition: background 0.3s;
        }
        .vote-dot.done   { background: var(--accent-green); }
        .vote-dot.active { background: var(--accent-yellow); }

        .tally-row {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px; border-radius: var(--radius-sm);
            background: var(--bg-card); border: 1px solid var(--border-color);
            margin-bottom: 8px; animation: popIn 0.25s ease both;
        }
        .tally-row.top { border-color: rgba(255,71,87,0.5); background: rgba(255,71,87,0.07); }
        .tally-bar-wrap { flex: 1; height: 6px; background: var(--border-color); border-radius: 3px; overflow: hidden; }
        .tally-bar { height: 100%; border-radius: 3px; background: var(--accent-green); transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }
        .tally-row.top .tally-bar { background: var(--accent-red); }

        .handoff-screen {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: calc(100% - 100px);
            text-align: center; padding: 40px 24px;
        }

        .stat-row {
            display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;
        }
        .stat-chip {
            padding: 8px 16px; border-radius: 100px;
            background: var(--bg-card); border: 1px solid var(--border-color);
            font-size: 13px; color: var(--text-secondary);
        }
        .stat-chip strong { color: var(--text-primary); }

        .dawn-card {
            margin: 20px auto; padding: 24px; border-radius: var(--radius);
            max-width: 300px; text-align: center;
            animation: popIn 0.3s ease;
        }
        .dawn-card.killed { background: rgba(255,71,87,0.07); border: 1px solid rgba(255,71,87,0.3); }
        .dawn-card.safe   { background: rgba(127,255,110,0.06); border: 1px solid rgba(127,255,110,0.3); }

        .info-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 16px;
            font-size: 13px; color: var(--text-dim); line-height: 2;
            margin-bottom: 20px;
        }

        .btn-red {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: #fff; border: none;
        }
        .btn-red:active { transform: scale(0.96); }

        .card-showcase-wrap {
            max-width: 960px;
            margin: 0 auto;
            padding: 8px 0 18px;
        }

        .card-showcase-title {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-yellow), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-showcase-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 18px;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 14px;
        }

        .showcase-card {
            border-radius: 20px;
            border: 1px solid rgba(255, 213, 87, 0.35);
            background: linear-gradient(145deg, rgba(30, 20, 60, 0.96), rgba(20, 20, 42, 0.96));
            padding: 18px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.34);
            animation: popIn 0.24s ease both;
        }

        .showcase-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .showcase-icon {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            border: 1px solid rgba(255, 213, 87, 0.38);
            background: rgba(255, 213, 87, 0.09);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .showcase-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-yellow);
        }

        .showcase-title {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .showcase-desc {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        /* ── 全屏特权卡展示 ── */
        .priv-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 单人：整屏居中 */
        .priv-single {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 24px;
            background: radial-gradient(ellipse at 50% 30%, rgba(255,213,87,0.10) 0%, transparent 65%);
        }

        /* 双人：上下对分 */
        .priv-dual {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .priv-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            position: relative;
        }

        .priv-half:first-child {
            background: radial-gradient(ellipse at 50% 60%, rgba(255,213,87,0.10) 0%, transparent 70%);
            border-bottom: 1px solid rgba(255,213,87,0.20);
        }

        .priv-half:last-child {
            background: radial-gradient(ellipse at 50% 40%, rgba(255,107,157,0.10) 0%, transparent 70%);
        }

        .priv-holder-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .priv-holder-name {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-yellow), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .priv-half .priv-holder-name {
            font-size: 20px;
            margin-bottom: 12px;
        }

        /* 英雄卡片 */
        .priv-hero-card {
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            border: 1.5px solid rgba(255,213,87,0.40);
            background: linear-gradient(145deg, rgba(36,24,72,0.98), rgba(18,18,42,0.98));
            box-shadow: 0 20px 60px rgba(0,0,0,0.50), 0 0 40px rgba(255,213,87,0.08);
            padding: 28px 24px;
            text-align: center;
            animation: popIn 0.3s ease both;
        }

        .priv-half .priv-hero-card {
            padding: 18px 16px;
            border-radius: 18px;
        }

        .priv-hero-emoji {
            font-size: 68px;
            line-height: 1;
            margin-bottom: 14px;
        }

        .priv-half .priv-hero-emoji {
            font-size: 44px;
            margin-bottom: 8px;
        }

        .priv-hero-name {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-yellow);
            margin-bottom: 4px;
        }

        .priv-half .priv-hero-name {
            font-size: 20px;
        }

        .priv-hero-title {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .priv-half .priv-hero-title {
            font-size: 12px;
            margin-bottom: 10px;
        }

        .priv-hero-divider {
            width: 40px;
            height: 1px;
            background: rgba(255,213,87,0.30);
            margin: 0 auto 14px;
        }

        .priv-hero-desc {
            font-size: 13px;
            line-height: 1.75;
            color: var(--text-secondary);
            text-align: left;
        }

        .priv-half .priv-hero-desc {
            font-size: 12px;
            line-height: 1.6;
        }

        .public-card-stage {
            text-align: center;
        }

        .public-card-stage .showcase-card {
            margin: 14px 0 16px;
            text-align: left;
        }

        /* iPad Pro 12.9 横屏优化 */
        @media (min-width: 1024px) and (orientation: landscape) {
            .screen {
                max-width: 1180px;
                margin: 0 auto;
                left: 0;
                right: 0;
            }

            .header,
            .content,
            .bottom-bar {
                width: 100%;
                padding-left: 32px;
                padding-right: 32px;
            }

            .content {
                max-width: 1080px;
                margin: 0 auto;
            }

            .home-container {
                max-width: 980px;
                margin: 0 auto;
            }

            .home-buttons {
                max-width: 460px;
            }

            .card-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 14px;
            }

            .showcase-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 16px;
            }

            .btn,
            .header-back,
            .player-count-btn,
            .card-option,
            .vote-candidate,
            .player-card {
                min-height: 56px;
            }

            .role-icon,
            .player-avatar {
                width: 62px;
                height: 62px;
                font-size: 38px;
            }

            .card-emoji {
                font-size: 36px;
            }

            #role-card-display {
                width: 300px !important;
                height: 380px !important;
            }

            .card-showcase-title {
                font-size: 34px;
            }

            .showcase-card {
                min-height: 220px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div id="app-root">

<!-- 首页 -->
<div id="screen-home" class="screen active">
    <div class="home-container">
        <div class="home-logo">😏🦁</div>
        <div class="home-title">狼人杀</div>
        <div class="home-subtitle">特权卡版</div>
        <div class="home-buttons">
            <button class="btn btn-primary btn-lg btn-block" onclick="setupScreen.init()">
                🎮 开始新游戏
            </button>
            <button class="btn btn-secondary btn-lg btn-block" onclick="showRulesModal()">
                📖 游戏规则
            </button>
        </div>
    </div>
</div>

<!-- 设置 - 人数选择 -->
<div id="screen-setup" class="screen">
    <div class="header">
        <button class="header-back" onclick="gameState.goHome()">←</button>
        <div class="header-title">新游戏</div>
        <div style="width:40px"></div>
    </div>
    <div class="content">
        <div class="setup-section">
            <div class="setup-label">👥 选择玩家人数</div>

        </div>

        <div class="setup-section" id="cards-section" style="display:none">

            <div id="cards-grid" class="card-grid"></div>
        </div>
    </div>
    <div class="bottom-bar">
        <button id="btn-setup-next" class="btn btn-primary btn-block" style="display:none" onclick="setupScreen.nextStep()">
            下一步 →
        </button>
    </div>
</div>

<!-- 特权卡展示（大页面） -->
<div id="screen-card-showcase" class="screen">
    <div id="card-showcase-stage" class="priv-stage"></div>
    <div class="bottom-bar">
        <button class="btn btn-primary btn-block btn-lg" onclick="setupScreen.proceedToRoleReveal()">
            继续 · 分配角色 →
        </button>
    </div>
</div>

<!-- 角色查看（传阅模式） -->
<div id="screen-role-reveal" class="screen">
    <div class="header">
        <div style="width:40px"></div>
        <div class="header-title">角色分配</div>
        <button class="header-back" onclick="gameState.goHome()">X</button>
    </div>
    <div class="content" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div id="reveal-container" style="text-align: center;">
            <div style="font-size: 24px; font-weight: 700; margin-bottom: 16px; color: var(--accent-blue);">
                <span id="current-player-name"></span> 的角色
            </div>
            <div id="role-card-display" style="width: 100%; margin: 12px 0;"></div>
            <div id="reveal-nav" style="margin-top: 20px;"></div>
        </div>
    </div>
</div>

<!-- 游戏主界面 -->
<div id="screen-game" class="screen">
    <div class="header">
        <div style="width:40px"></div>
        <div class="header-title" id="game-phase-text">游戏进行中</div>
        <button class="header-back" onclick="gameState.goHome()">X</button>

    <div class="content">
        <div id="game-content"></div>

<!-- 游戏结束 -->
<div id="screen-game-over" class="screen">
